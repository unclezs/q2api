<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Q2API</title>
    <style>
        :root {
            --background: 0 0% 3.9%;
            --foreground: 0 0% 98%;
            --card: 0 0% 3.9%;
            --card-foreground: 0 0% 98%;
            --primary: 0 0% 98%;
            --primary-foreground: 0 0% 9%;
            --secondary: 0 0% 14.9%;
            --muted: 0 0% 14.9%;
            --muted-foreground: 0 0% 63.9%;
            --destructive: 0 62.8% 30.6%;
            --border: 0 0% 14.9%;
            --input: 0 0% 14.9%;
            --ring: 0 0% 83.1%;
            --radius: 0.5rem;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: hsl(var(--background));
            color: hsl(var(--foreground));
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            -webkit-font-smoothing: antialiased;
        }
        .container { width: 100%; max-width: 400px; }
        .header { text-align: center; margin-bottom: 2rem; }
        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background: hsl(var(--foreground));
            border-radius: 12px;
            margin-bottom: 1rem;
        }
        .logo svg { width: 24px; height: 24px; }
        .logo svg circle, .logo svg path { stroke: hsl(var(--background)); }
        .logo svg text { fill: hsl(var(--background)); }
        h1 { font-size: 1.875rem; font-weight: 600; letter-spacing: -0.025em; margin-bottom: 0.5rem; }
        .subtitle { color: hsl(var(--muted-foreground)); font-size: 0.875rem; }
        .card {
            background: hsl(var(--card));
            border: 1px solid hsl(var(--border));
            border-radius: var(--radius);
            padding: 1.5rem;
        }
        .field { margin-bottom: 1.5rem; }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: hsl(var(--foreground));
        }
        input {
            width: 100%;
            height: 2.5rem;
            padding: 0 0.75rem;
            font-size: 0.875rem;
            background: transparent;
            border: 1px solid hsl(var(--input));
            border-radius: calc(var(--radius) - 2px);
            color: hsl(var(--foreground));
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input::placeholder { color: hsl(var(--muted-foreground)); }
        input:focus {
            border-color: hsl(var(--ring));
            box-shadow: 0 0 0 2px hsl(var(--ring) / 0.2);
        }
        button {
            width: 100%;
            height: 2.5rem;
            padding: 0 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            background: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            border: none;
            border-radius: calc(var(--radius) - 2px);
            cursor: pointer;
            transition: opacity 0.15s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        @keyframes slide-up {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            font-size: 0.875rem;
            font-weight: 500;
            animation: slide-up 0.3s ease-out;
            z-index: 1000;
            border: 1px solid;
        }
        .toast.error {
            background: hsl(0 62.8% 30.6% / 0.1);
            border-color: hsl(0 62.8% 30.6%);
            color: hsl(0 62.8% 50%);
        }
        .toast.success {
            background: hsl(142 76% 36% / 0.1);
            border-color: hsl(142 76% 36%);
            color: hsl(142 76% 46%);
        }
        .footer {
            text-align: center;
            margin-top: 1.5rem;
            color: hsl(var(--muted-foreground));
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Q2API</h1>
        </div>
        <div class="card">
            <form id="loginForm">
                <div class="field">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required placeholder="请输入管理密码" autofocus>
                </div>
                <button type="submit" id="loginButton">登 录</button>
            </form>
        </div>
        <div class="footer">
            Powered by Amazon Q
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const btn = document.getElementById('loginButton');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                const fd = new FormData(form);
                const r = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: fd.get('password') })
                });
                const d = await r.json();

                if (d.success) {
                    localStorage.setItem('adminPassword', fd.get('password'));
                    location.href = '/';
                } else {
                    showToast(d.message || '登录失败', 'error');
                }
            } catch (e) {
                showToast('网络错误，请重试', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        });

        function showToast(msg, type = 'error') {
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = msg;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
